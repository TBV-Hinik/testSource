<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/lab_11/src/css/login/style.css">
</head>
<body>
    <div class="login-page">

        <div class="login-hero">
            <a href="/lab_11/src/images/men_on_mount.png" class="login-hero__image-wrapper" title="Человек на вершине горы">
                <img class="login-hero__image" src="/lab_11/src/images/men_on_mount.png" alt="men on mount">
            </a>
            <h1 class="login-hero__title">Войти</h1>
        </div>

        <form class="login-form" action="/lab_11/home.html">
            <div class="login-form__group">
                <span class="login-form__span" for="email">Электропочта</span>
                <input class="login-form__input" type="email" id="email" required>
                <span class="login-form__hint">Введите электропочту в формате *****@***.**</span>
            </div>

            <div class="login-form__group">
                <span class="login-form__span" for="password">Пароль</span>
                <input class="login-form__input" type="password" id="password" required>
            </div>

            <button class="login-form__button" type="submit">Продолжить</button>
        </form>

    </div>
</body>
</html>
