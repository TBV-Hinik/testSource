<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/lab_7/src/css/login/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-hero">
            <div class="login-hero__image-wrapper">
                <img class="login-hero__image" src="/lab_7/src/images/men_on_mount.png" alt="men">
            </div>
            <h1 class="login-hero__title">Войти</h1>
        </div>

        <div class="login-form-wrapper">
            <form class="login-form" action="/lab_7/home.html">
                <div class="form-group">
                    <span for="email">Электропочта</span>
                    <input type="email" id="email" required>
                    <span>Введите электропочту в формате *****@***.**</span>
                </div>

                <div class="form-group">
                    <span for="password">Пароль</span>
                    <input type="password" id="password" required>
                </div>

                <button type="submit">Продолжить</button>
            </form>
        </div>
    </div>
</body>
</html>
